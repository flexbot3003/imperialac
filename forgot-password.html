<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="robots" content="noindex, nofollow">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Reset Admin Password | Imperial AC</title>
  <meta name="description" content="Request an Imperial AC club dashboard password reset.">
  <link rel="icon" href="assets/logo-mark.svg" type="image/svg+xml">
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="css/auth.css">
  <script defer src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script defer src="js/cms-config.js"></script>
  <script defer src="js/forgot-password.js"></script>
</head>
<body class="auth-page">
  <main class="auth-card">
    <a class="auth-brand" href="index.html">
      <img src="assets/logo-mark.svg" alt="">
      <span>Imperial AC</span>
    </a>

    <p class="auth-eyebrow">Club dashboard</p>
    <h1>Reset your password</h1>
    <p class="auth-copy">
      Enter the administrator email address. A secure recovery link will be sent to that inbox.
    </p>

    <div id="authNotice" class="auth-notice" role="status" aria-live="polite" hidden></div>

    <form id="forgotPasswordForm" class="auth-form">
      <label class="auth-field">
        Email address
        <input
          id="resetEmail"
          name="email"
          type="email"
          autocomplete="email"
          required
        >
      </label>

      <button id="sendResetButton" class="auth-button" type="submit">
        Send recovery email
      </button>
    </form>

    <p class="auth-back"><a href="admin.html">Back to dashboard login</a></p>
  </main>
</body>
</html>
