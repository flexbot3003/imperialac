<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="robots" content="noindex, nofollow">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Choose New Password | Imperial AC</title>
  <meta name="description" content="Choose a new Imperial AC club dashboard password.">
  <link rel="icon" href="assets/logo-mark.svg" type="image/svg+xml">
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="css/auth.css">
  <script defer src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script defer src="js/cms-config.js"></script>
  <script defer src="js/reset-password.js"></script>
</head>
<body class="auth-page">
  <main class="auth-card">
    <a class="auth-brand" href="index.html">
      <img src="assets/logo-mark.svg" alt="">
      <span>Imperial AC</span>
    </a>

    <p class="auth-eyebrow">Secure recovery</p>
    <h1>Choose a new password</h1>
    <p class="auth-copy">
      Use at least 12 characters and avoid reusing a password from another account.
    </p>

    <div id="authNotice" class="auth-notice" role="status" aria-live="polite">
      Checking your recovery link…
    </div>

    <form id="resetPasswordForm" class="auth-form" hidden>
      <label class="auth-field">
        New password
        <input
          id="newPassword"
          type="password"
          autocomplete="new-password"
          minlength="12"
          required
        >
      </label>

      <label class="auth-field">
        Confirm new password
        <input
          id="confirmPassword"
          type="password"
          autocomplete="new-password"
          minlength="12"
          required
        >
      </label>

      <button id="updatePasswordButton" class="auth-button" type="submit">
        Save new password
      </button>
    </form>

    <p class="auth-back"><a href="admin.html">Back to dashboard login</a></p>
  </main>
</body>
</html>
